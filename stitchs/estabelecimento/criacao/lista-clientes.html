<div class="flex flex-col sm:flex-row items-center gap-4">

<input class="bg-surface-container-highest border-none rounded-full pl-10 pr-4 py-2.5 text-sm w-full focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Buscar estabelecimento..." type="text"/>

<th class="px-6 py-4 font-headline text-sm font-semibold text-slate-700 uppercase tracking-wider text-right">Ações</th>

<span class="w-1.5 h-1.5 rounded-full bg-primary"></span>
                                        Publicado
                                    </span>
</td>
<td class="px-6 py-5 text-right">
<div class="flex items-center justify-end gap-2">
<button class="p-2 text-slate-400 hover:text-primary hover:bg-primary/10 rounded-lg transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="edit">edit</span>

</div>

<div class="text-xs text-slate-400 font-medium">ID: #00915</div>
</div>
</div>

<td class="px-6 py-5">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-tertiary-fixed text-on-tertiary-fixed">

</div>

<td class="px-6 py-5">

<div class="flex items-center justify-end gap-2">

</div>

<div class="flex items-center gap-2">

<button class="p-2 rounded-lg border border-outline-variant hover:bg-white transition-colors">

</div>
</section>
