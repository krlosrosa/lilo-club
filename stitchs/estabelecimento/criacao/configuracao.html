        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

<body class="bg-surface text-on-surface min-h-screen">
<!-- Main Content Area - Full width -->
<main class="min-h-screen">
<div class="max-w-6xl mx-auto p-8 py-16">
<!-- Page Header -->
<div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
<div>
<h2 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2 font-headline">Configurações de Perfil</h2>
<p class="text-on-surface-variant text-lg font-body">Gerencie suas informações pessoais e credenciais de acesso ao portal.</p>
</div>
<button class="bg-primary text-on-primary px-8 py-3 rounded-full font-bold text-sm shadow-lg hover:opacity-90 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm">save</span>
                    Salvar Alterações
                </button>
</div>
<!-- Single Column Layout -->
<div class="space-y-8">
<!-- Profile Main Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-sm relative overflow-hidden group border border-surface-variant/30">
<!-- Decorative background element -->
<div class="absolute top-0 right-0 -mt-12 -mr-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="flex flex-col md:flex-row items-start gap-8 relative z-10">
<!-- Avatar Section -->
<div class="relative group/avatar">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-2xl overflow-hidden ring-4 ring-surface-container shadow-lg">
<img alt="Foto do Usuário" class="w-full h-full object-cover" data-alt="close-up portrait of a successful brazilian entrepreneur with a confident look, wearing a casual linen shirt, bright natural studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAUg7vR2TplLOjZP1fjSWf0bSALyK9LTDwky3Z18nB3zbHYF22Qljw7GOLFxLOKJAMk8zUNCqR26v2c3MJVOXIin5jOv_mMSuR3YHSkCVhSBY0f-_8BBcNlEp11Psk0tqB2Ax5sVl4w1r9skjQrFW5lkxtNz5qVWSPgNFVaFA7mYl4azmPofwU3XwM_Amf3iC6Y-GXhBddp8U1ShnJO0fMLAmXBCugm0gRE0tJMRYyujg6FjukxGCbKnooMNgpUBC2lV5VYspdUxWv"/>
</div>
<button class="absolute -bottom-2 -right-2 bg-secondary text-on-secondary p-3 rounded-xl shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-lg">photo_camera</span>
</button>
</div>
<!-- Info Section -->
<div class="flex-1 space-y-6">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<div>
<div class="flex items-center gap-3 mb-1">
<h3 class="text-3xl font-bold text-on-surface font-headline">Ricardo Almeida</h3>
<span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] uppercase tracking-widest font-bold px-2 py-1 rounded">Dono</span>
</div>
<p class="text-on-surface-variant font-body">ricardo.almeida@acuradoria.com.br</p>
</div>
<button class="flex items-center justify-center gap-2 px-6 py-3 bg-secondary-fixed-dim text-on-secondary-fixed-variant font-bold rounded-full hover:bg-secondary-container transition-colors font-label">
<span class="material-symbols-outlined text-sm">edit</span>
                                    Editar Perfil
                                </button>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-8">
<div class="p-4 bg-surface-container-low rounded-lg">
<span class="text-xs font-bold text-outline uppercase tracking-wider block mb-3">Tipo de Usuário</span>
<div class="flex flex-wrap gap-4">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary transition-all cursor-pointer" name="user_type" type="radio" value="cliente"/>
<div class="absolute w-2.5 h-2.5 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface">cliente</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input checked="" class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary transition-all cursor-pointer" name="user_type" type="radio" value="dono"/>
<div class="absolute w-2.5 h-2.5 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface">dono</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary transition-all cursor-pointer" name="user_type" type="radio" value="parceiro"/>
<div class="absolute w-2.5 h-2.5 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface">parceiro</span>
</label>
</div>
</div>
<div class="p-4 bg-surface-container-low rounded-lg">
<span class="text-xs font-bold text-outline uppercase tracking-wider block mb-1">Membro desde</span>
<span class="text-on-surface font-semibold flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">calendar_today</span>
                                        Outubro 2023
                                    </span>
</div>
</div>
</div>
</div>
</div>
<!-- Detailed Info Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-sm border border-surface-variant/30">
<div class="flex items-center gap-4 mb-8">
<div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary">badge</span>
</div>
<h3 class="text-xl font-bold font-headline">Dados Profissionais</h3>
</div>
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-semibold text-outline mb-2 ml-1" for="nome_completo">Nome Completo</label>
<input class="w-full p-4 bg-surface-container-low border border-outline-variant/50 rounded-lg text-on-surface font-medium focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="nome_completo" type="text" value="Ricardo de Almeida Santos"/>
</div>
<div>
<label class="block text-sm font-semibold text-outline mb-2 ml-1" for="email_principal">E-mail Principal</label>
<input class="w-full p-4 bg-surface-container-low border border-outline-variant/50 rounded-lg text-on-surface font-medium focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email_principal" type="email" value="ricardo.almeida@acuradoria.com.br"/>
</div>
<div>
<label class="block text-sm font-semibold text-outline mb-2 ml-1" for="telefone_celular">Telefone Celular</label>
<div class="w-full p-4 bg-surface-container-highest/50 rounded-lg text-on-surface/70 font-medium cursor-not-allowed">+55 (11) 98872-4431</div>
</div>
</div>
</div>
</div>
</div>
<!-- Additional Footer Action -->
<div class="mt-12 pt-8 border-t border-surface-variant/30 flex justify-end">
<button class="flex items-center justify-center gap-2 py-3 px-8 rounded-full bg-surface-container-highest text-on-surface-variant font-bold text-sm shadow-sm hover:bg-surface-variant transition-all">
                    Ver Guia Público
                </button>
</div>
</div>
