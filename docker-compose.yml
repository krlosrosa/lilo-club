# Produção: Web (/) + API (/api) no mesmo host via Traefik.
# A stack tem de usar a MESMA rede Docker à qual o Traefik está ligado.
# Defina TRAEFIK_NETWORK nas variáveis da stack (Portainer) — ex.: proxy, web, traefik-public.
#   docker network ls   # veja o nome real (no teu host costuma ser "proxy").
#
# === PORTAINER: SEM env_file NESTE FICHEIRO ===
# Se aparecer: "env file /data/compose/.../.env not found" → o YAML na stack AINDA tem
# `env_file: .env` (ou herdado de template). No editor da stack: Ctrl+F "env_file" e
# REMOVA esse bloco inteiro; depois cole de novo este ficheiro do repositório (Git pull).
# NÃO marque opções do tipo "anexar .env ao serviço" se isso recriar `env_file`.
# Variáveis: só "Environment variables" da stack + ${VAR} abaixo (ver .env.docker.example).
#
# CLI local: `docker compose --env-file .env up -d` ou exporte as mesmas variáveis.

name: lilo-hub

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      # Postgres noutro servidor: defina DATABASE_URL na stack (Portainer) ou no `.env` da raiz (compose --env-file).
      DATABASE_URL: ${DATABASE_URL}
      SWAGGER_ENABLED: "false"
      CORS_ORIGINS: "https://${DOMAIN}"
      WEB_APP_URL: "https://${DOMAIN}"
      GOOGLE_CALLBACK_URL: "https://${DOMAIN}/api/auth/google/callback"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-access_token}
      JWT_COOKIE_MAX_AGE_MS: ${JWT_COOKIE_MAX_AGE_MS:-3600000}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    networks:
      - traefik_edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.lilo-api-secure.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.lilo-api-secure.entrypoints=websecure
      - traefik.http.routers.lilo-api-secure.tls=true
      - traefik.http.routers.lilo-api-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.lilo-api-secure.priority=100
      - traefik.http.routers.lilo-api-secure.service=lilo-api
      - traefik.http.services.lilo-api.loadbalancer.server.port=4000
      - traefik.http.routers.lilo-api-http.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.lilo-api-http.entrypoints=web
      - traefik.http.routers.lilo-api-http.middlewares=lilo-gotls@docker
      - traefik.http.routers.lilo-api-http.priority=100
      - traefik.http.routers.lilo-api-http.service=lilo-api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_INTERNAL_URL: http://api:4000/api
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    depends_on:
      - api
    networks:
      - traefik_edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.middlewares.lilo-gotls.redirectscheme.scheme=https
      - traefik.http.middlewares.lilo-gotls.redirectscheme.permanent=true
      - traefik.http.routers.lilo-web-secure.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.lilo-web-secure.entrypoints=websecure
      - traefik.http.routers.lilo-web-secure.tls=true
      - traefik.http.routers.lilo-web-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.lilo-web-secure.priority=10
      - traefik.http.routers.lilo-web-secure.service=lilo-web
      - traefik.http.services.lilo-web.loadbalancer.server.port=3000
      - traefik.http.routers.lilo-web-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.lilo-web-http.entrypoints=web
      - traefik.http.routers.lilo-web-http.middlewares=lilo-gotls@docker
      - traefik.http.routers.lilo-web-http.priority=10
      - traefik.http.routers.lilo-web-http.service=lilo-web

networks:
  traefik_edge:
    name: ${TRAEFIK_NETWORK}
    external: true
  internal:
    driver: bridge
